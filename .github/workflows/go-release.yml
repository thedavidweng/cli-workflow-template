name: Release

on:
  workflow_call:
    inputs:
      enable-syft:
        description: 'Generate SBOM with syft'
        type: boolean
        default: true
      enable-pre-release-test:
        description: 'Run tests before GoReleaser'
        type: boolean
        default: true
      enable-homebrew-verify:
        description: 'Verify HOMEBREW_TAP_GITHUB_TOKEN permissions'
        type: boolean
        default: true
    secrets:
      HOMEBREW_TAP_GITHUB_TOKEN:
        required: false
      SCOOP_BUCKET_GITHUB_TOKEN:
        required: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Install syft
        if: inputs.enable-syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Run pre-release tests
        if: inputs.enable-pre-release-test
        run: go test ./... -race

      - name: Verify Homebrew tap token
        if: inputs.enable-homebrew-verify
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error title=Missing HOMEBREW_TAP_GITHUB_TOKEN::Create a GitHub token that can write contents to thedavidweng/homebrew-tap before running a release."
            exit 1
          fi
          can_push="$(gh api repos/thedavidweng/homebrew-tap --jq '.permissions.push')"
          if [ "$can_push" != "true" ]; then
            echo "::error title=Invalid HOMEBREW_TAP_GITHUB_TOKEN::The token must have write access to thedavidweng/homebrew-tap."
            exit 1
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}
