name: Go CI

on:
  workflow_call:
    inputs:
      os-matrix:
        description: 'JSON array of OS to test on'
        type: string
        default: '["ubuntu-latest", "macos-latest", "windows-latest"]'
      enable-golangci-lint:
        description: 'Run golangci-lint'
        type: boolean
        default: true
      golangci-lint-version:
        description: 'golangci-lint version'
        type: string
        default: 'latest'
      enable-gofmt:
        description: 'Run explicit gofmt check'
        type: boolean
        default: true
      enable-race:
        description: 'Run tests with race detector'
        type: boolean
        default: true
      enable-snapshot:
        description: 'Build GoReleaser snapshot on main'
        type: boolean
        default: true
      enable-errcheck:
        description: 'Run errcheck for unhandled errors'
        type: boolean
        default: false
      enable-coverage:
        description: 'Run coverage check'
        type: boolean
        default: false
      coverage-threshold:
        description: 'Minimum coverage percentage'
        type: string
        default: '50'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        os: ${{ fromJson(inputs.os-matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - run: go mod download
      - run: go vet ./...
      - name: Test
        run: >
          go test ./...
          ${{ inputs.enable-race && '-race' || '' }}
          ${{ inputs.enable-coverage && matrix.os == 'ubuntu-latest' && '-coverprofile=coverage.out -covermode=atomic' || '' }}
      - run: go build ./...

      - name: Coverage threshold
        if: inputs.enable-coverage && matrix.os == 'ubuntu-latest'
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          THRESHOLD="${COVERAGE_THRESHOLD}"
          if [ "$(echo "${COVERAGE} < ${THRESHOLD}" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
        env:
          COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}

      - name: Upload coverage to Codecov
        if: inputs.enable-coverage && secrets.CODECOV_TOKEN != '' && matrix.os == 'ubuntu-latest' && !cancelled()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          flags: go
          fail_ci_if_error: false

  lint:
    if: inputs.enable-golangci-lint || inputs.enable-gofmt || inputs.enable-errcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - run: go mod download

      - name: Check formatting
        if: inputs.enable-gofmt
        run: test -z "$(gofmt -l .)"

      - name: golangci-lint
        if: inputs.enable-golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ inputs.golangci-lint-version }}

      - name: errcheck
        if: inputs.enable-errcheck
        run: |
          go install github.com/kisielk/errcheck@v1.20.0
          errcheck ./...

  snapshot:
    if: inputs.enable-snapshot && github.ref == 'refs/heads/main'
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: build --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
